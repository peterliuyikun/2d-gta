<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        #gameContainer { position: relative; width: 800px; height: 480px; background: #2d3436; border: 3px solid #636e72; border-radius: 8px; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #stats { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 14px; text-shadow: 1px 1px 2px #000; }
        #stats div { margin-bottom: 5px; }
        #towerSelect { position: absolute; bottom: 10px; left: 10px; display: flex; gap: 10px; pointer-events: auto; }
        .towerBtn { width: 60px; height: 60px; border: 2px solid #fff; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #fff; transition: all 0.2s; }
        .towerBtn:hover { transform: scale(1.05); }
        .towerBtn.selected { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        .towerBtn.basic { background: #3498db; }
        .towerBtn.sniper { background: #e74c3c; }
        .towerBtn.splash { background: #9b59b6; }
        #startWave { position: absolute; top: 10px; right: 10px; padding: 10px 20px; font-size: 16px; background: #27ae60; color: #fff; border: none; border-radius: 4px; cursor: pointer; pointer-events: auto; }
        #startWave:hover { background: #2ecc71; }
        #startWave:disabled { background: #7f8c8d; cursor: not-allowed; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; pointer-events: auto; }
        #gameOver h1 { font-size: 48px; color: #e74c3c; text-shadow: 2px 2px 4px #000; margin-bottom: 20px; }
        #gameOver button { padding: 15px 30px; font-size: 20px; background: #3498db; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        #gameOver button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        <div id="ui">
            <div id="stats">
                <div>LIVES: <span id="lives">20</span></div>
                <div>MONEY: $<span id="money">100</span></div>
                <div>WAVE: <span id="wave">1</span></div>
                <div>SCORE: <span id="score">0</span></div>
            </div>
            <div id="towerSelect">
                <div class="towerBtn basic selected" data-type="basic"><div>BASIC</div><div>$50</div></div>
                <div class="towerBtn sniper" data-type="sniper"><div>SNIPER</div><div>$100</div></div>
                <div class="towerBtn splash" data-type="splash"><div>SPLASH</div><div>$150</div></div>
            </div>
            <button id="startWave">START WAVE</button>
            <div id="gameOver"><h1>GAME OVER</h1><button id="restart">RESTART</button></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let lives = 20, money = 100, wave = 1, score = 0, selectedTower = 'basic', waveActive = false, gameRunning = true;
        let enemiesSpawned = 0, enemiesToSpawn = 0, spawnTimer = 0;
        const cols = 16, rows = 9, cellSize = 50;
        const path = [{x:0,y:4},{x:1,y:4},{x:2,y:4},{x:3,y:4},{x:3,y:3},{x:3,y:2},{x:4,y:2},{x:5,y:2},{x:5,y:3},{x:5,y:4},{x:5,y:5},{x:5,y:6},{x:6,y:6},{x:7,y:6},{x:8,y:6},{x:8,y:5},{x:8,y:4},{x:8,y:3},{x:9,y:3},{x:10,y:3},{x:11,y:3},{x:11,y:4},{x:11,y:5},{x:12,y:5},{x:13,y:5},{x:14,y:5},{x:15,y:5}];
        const grid = [], towers = [], enemies = [], projectiles = [];
        const towerTypes = { basic: { cost: 50, damage: 20, range: 100, fireRate: 30, color: '#3498db', speed: 8 }, sniper: { cost: 100, damage: 60, range: 200, fireRate: 60, color: '#e74c3c', speed: 15 }, splash: { cost: 150, damage: 30, range: 80, fireRate: 45, color: '#9b59b6', speed: 6, splash: 50 } };
        for (let y = 0; y < rows; y++) { grid[y] = []; for (let x = 0; x < cols; x++) grid[y][x] = { tower: null, path: path.some(p => p.x === x && p.y === y) }; }

        class Tower {
            constructor(x, y, type) { this.x = x; this.y = y; this.type = type; this.stats = towerTypes[type]; this.cooldown = 0; this.angle = 0; }
            update() {
                if (this.cooldown > 0) this.cooldown--;
                const target = this.findTarget();
                if (target) {
                    this.angle = Math.atan2(target.y - (this.y * 50 + 25), target.x - (this.x * 50 + 25));
                    if (this.cooldown <= 0) { projectiles.push(new Projectile(this.x * 50 + 25, this.y * 50 + 25, target, this.stats)); this.cooldown = this.stats.fireRate; }
                }
            }
            findTarget() { let closest = null, minDist = Infinity; for (const e of enemies) { const d = Math.hypot(e.x - (this.x * 50 + 25), e.y - (this.y * 50 + 25)); if (d < this.stats.range && d < minDist) { minDist = d; closest = e; } } return closest; }
            draw() { const cx = this.x * 50 + 25, cy = this.y * 50 + 25; ctx.save(); ctx.translate(cx, cy); ctx.rotate(this.angle); ctx.fillStyle = this.stats.color; ctx.fillRect(-15, -15, 30, 30); ctx.fillStyle = '#fff'; ctx.fillRect(0, -5, 25, 10); ctx.restore(); ctx.fillStyle = this.stats.color; ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI * 2); ctx.fill(); }
        }

        class Enemy {
            constructor(w) { this.pathIndex = 0; this.x = path[0].x * 50 + 25; this.y = path[0].y * 50 + 25; this.maxHp = 20 + w * 10; this.hp = this.maxHp; this.speed = 1 + w * 0.1; this.reward = 10 + w * 2; }
            update() {
                if (this.pathIndex >= path.length - 1) { lives--; updateUI(); return true; }
                const target = path[this.pathIndex + 1], tx = target.x * 50 + 25, ty = target.y * 50 + 25;
                const dx = tx - this.x, dy = ty - this.y, dist = Math.hypot(dx, dy);
                if (dist < this.speed) { this.pathIndex++; this.x = tx; this.y = ty; } else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
                return false;
            }
            draw() { ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(this.x, this.y, 12, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.arc(this.x - 3, this.y - 3, 4, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#2ecc71'; ctx.fillRect(this.x - 10, this.y - 18, 20 * (this.hp / this.maxHp), 4); }
        }

        class Projectile {
            constructor(x, y, target, stats) { this.x = x; this.y = y; this.target = target; this.stats = stats; this.speed = stats.speed; this.damage = stats.damage; }
            update() {
                if (!enemies.includes(this.target)) return true;
                const dx = this.target.x - this.x, dy = this.target.y - this.y, dist = Math.hypot(dx, dy);
                if (dist < this.speed) {
                    this.target.hp -= this.damage;
                    if (this.stats.splash) for (const e of enemies) if (e !== this.target && Math.hypot(e.x - this.x, e.y - this.y) < this.stats.splash) e.hp -= this.damage * 0.5;
                    if (this.target.hp <= 0) { money += this.target.reward; score += this.target.reward; enemies.splice(enemies.indexOf(this.target), 1); }
                    return true;
                }
                this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
                return false;
            }
            draw() { ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill(); }
        }

        function update() {
            if (!gameRunning) return;
            if (lives <= 0) { gameRunning = false; document.getElementById('gameOver').style.display = 'block'; return; }
            if (waveActive && enemiesSpawned < enemiesToSpawn) {
                spawnTimer++;
                if (spawnTimer >= 60) { enemies.push(new Enemy(wave)); enemiesSpawned++; spawnTimer = 0; }
            }
            if (waveActive && enemies.length === 0 && enemiesSpawned >= enemiesToSpawn) { waveActive = false; document.getElementById('startWave').disabled = false; wave++; updateUI(); }
            for (const t of towers) t.update();
            for (let i = enemies.length - 1; i >= 0; i--) if (enemies[i].update()) enemies.splice(i, 1);
            for (let i = projectiles.length - 1; i >= 0; i--) if (projectiles[i].update()) projectiles.splice(i, 1);
            updateUI();
        }

        function draw() {
            ctx.fillStyle = '#2d3436'; ctx.fillRect(0, 0, 800, 480);
            for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
                ctx.strokeStyle = '#636e72'; ctx.strokeRect(x * 50, y * 50, 50, 50);
                if (grid[y][x].path) { ctx.fillStyle = '#f39c12'; ctx.fillRect(x * 50 + 5, y * 50 + 5, 40, 40); }
            }
            for (const t of towers) t.draw();
            for (const e of enemies) e.draw();
            for (const p of projectiles) p.draw();
        }

        function updateUI() {
            document.getElementById('lives').textContent = lives;
            document.getElementById('money').textContent = money;
            document.getElementById('wave').textContent = wave;
            document.getElementById('score').textContent = score;
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect(), x = Math.floor((e.clientX - rect.left) / 50), y = Math.floor((e.clientY - rect.top) / 50);
            if (x < 0 || x >= cols || y < 0 || y >= rows || grid[y][x].path || grid[y][x].tower || money < towerTypes[selectedTower].cost) return;
            money -= towerTypes[selectedTower].cost; grid[y][x].tower = new Tower(x, y, selectedTower); towers.push(grid[y][x].tower); updateUI();
        });

        document.querySelectorAll('.towerBtn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.towerBtn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedTower = btn.dataset.type; }));

        document.getElementById('startWave').addEventListener('click', () => { waveActive = true; enemiesToSpawn = 5 + wave * 3; enemiesSpawned = 0; spawnTimer = 0; document.getElementById('startWave').disabled = true; });

        document.getElementById('restart').addEventListener('click', () => {
            lives = 20; money = 100; wave = 1; score = 0; waveActive = false; gameRunning = true; enemies.length = 0; towers.length = 0; projectiles.length = 0;
            for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) grid[y][x].tower = null;
            document.getElementById('gameOver').style.display = 'none'; document.getElementById('startWave').disabled = false; updateUI();
        });

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
</html>
