<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros - HTML5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #5c94fc 0%, #4a7de0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .game-container {
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        #gameCanvas {
            display: block;
            background: #5c94fc;
            image-rendering: pixelated;
        }
        .ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        .ui-right {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        .controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 12px;
            text-shadow: 1px 1px 0 #000;
            text-align: center;
            z-index: 10;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 20;
        }
        .game-over h2 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #ff4444;
        }
        .game-over button {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .game-over button:hover {
            background: #45a049;
        }
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
        }
        .start-screen h1 {
            color: #ff0000;
            font-size: 48px;
            text-shadow: 4px 4px 0 #fff, -2px -2px 0 #000;
            margin-bottom: 20px;
        }
        .start-screen p {
            color: white;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .start-screen button {
            padding: 15px 40px;
            font-size: 24px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 0 #aa0000;
        }
        .start-screen button:hover {
            background: #ff5555;
        }
        .start-screen button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #aa0000;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        <div class="ui">
            <div>MARIO</div>
            <div id="score">000000</div>
            <div style="margin-top: 10px;">× <span id="lives">3</span></div>
        </div>
        <div class="ui-right">
            <div>WORLD</div>
            <div>1-1</div>
            <div style="margin-top: 10px;">TIME</div>
            <div id="time">400</div>
        </div>
        <div class="controls">
            ← → Move | SPACE Jump | R Restart
        </div>
        <div class="game-over" id="gameOver">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">TRY AGAIN</button>
        </div>
        <div class="start-screen" id="startScreen">
            <h1>SUPER MARIO</h1>
            <p>HTML5 Platformer Adventure</p>
            <button onclick="startGame()">START GAME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let time = 400;
        let timeInterval;
        let cameraX = 0;
        
        // Input handling
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyR' && !gameRunning) {
                restartGame();
            }
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);
        
        // Mario object
        const mario = {
            x: 100,
            y: 300,
            width: 32,
            height: 32,
            vx: 0,
            vy: 0,
            speed: 5,
            jumpPower: -14,
            grounded: false,
            facing: 1,
            color: '#ff0000'
        };
        
        // Game objects arrays
        let platforms = [];
        let coins = [];
        let enemies = [];
        let pipes = [];
        let clouds = [];
        let particles = [];
        
        // Initialize level
        function initLevel() {
            platforms = [];
            coins = [];
            enemies = [];
            pipes = [];
            clouds = [];
            particles = [];
            
            // Ground blocks
            for (let i = 0; i < 100; i++) {
                if (i < 15 || i > 18) { // Gap at position 15-18
                    platforms.push({ x: i * 32, y: 448, width: 32, height: 32, type: 'ground' });
                }
            }
            
            // Add more ground sections with gaps
            for (let i = 25; i < 35; i++) platforms.push({ x: i * 32, y: 448, width: 32, height: 32, type: 'ground' });
            for (let i = 40; i < 60; i++) platforms.push({ x: i * 32, y: 448, width: 32, height: 32, type: 'ground' });
            for (let i = 65; i < 100; i++) platforms.push({ x: i * 32, y: 448, width: 32, height: 32, type: 'ground' });
            
            // Brick platforms
            for (let i = 5; i < 10; i++) platforms.push({ x: i * 32, y: 320, width: 32, height: 32, type: 'brick' });
            for (let i = 12; i < 15; i++) platforms.push({ x: i * 32, y: 250, width: 32, height: 32, type: 'brick' });
            for (let i = 22; i < 28; i++) platforms.push({ x: i * 32, y: 280, width: 32, height: 32, type: 'brick' });
            for (let i = 45; i < 52; i++) platforms.push({ x: i * 32, y: 200, width: 32, height: 32, type: 'brick' });
            for (let i = 55; i < 60; i++) platforms.push({ x: i * 32, y: 320, width: 32, height: 32, type: 'brick' });
            
            // Question blocks
            platforms.push({ x: 6 * 32, y: 320, width: 32, height: 32, type: 'question', hit: false });
            platforms.push({ x: 9 * 32, y: 320, width: 32, height: 32, type: 'question', hit: false });
            platforms.push({ x: 48 * 32, y: 200, width: 32, height: 32, type: 'question', hit: false });
            platforms.push({ x: 57 * 32, y: 320, width: 32, height: 32, type: 'question', hit: false });
            
            // Coins
            for (let i = 0; i < 8; i++) {
                coins.push({ x: (5 + i) * 32 + 8, y: 280, width: 16, height: 16, collected: false });
            }
            for (let i = 0; i < 5; i++) {
                coins.push({ x: (22 + i) * 32 + 8, y: 240, width: 16, height: 16, collected: false });
            }
            for (let i = 0; i < 6; i++) {
                coins.push({ x: (45 + i) * 32 + 8, y: 160, width: 16, height: 16, collected: false });
            }
            
            // Pipes
            pipes.push({ x: 20 * 32, y: 416, width: 64, height: 64 });
            pipes.push({ x: 38 * 32, y: 384, width: 64, height: 96 });
            pipes.push({ x: 62 * 32, y: 416, width: 64, height: 64 });
            
            // Enemies (Goombas)
            enemies.push({ x: 400, y: 416, width: 32, height: 32, vx: -1, dead: false });
            enemies.push({ x: 800, y: 416, width: 32, height: 32, vx: -1, dead: false });
            enemies.push({ x: 1200, y: 416, width: 32, height: 32, vx: -1, dead: false });
            enemies.push({ x: 1600, y: 416, width: 32, height: 32, vx: -1, dead: false });
            enemies.push({ x: 2100, y: 416, width: 32, height: 32, vx: -1, dead: false });
            
            // Clouds
            for (let i = 0; i < 20; i++) {
                clouds.push({
                    x: Math.random() * 3000,
                    y: 50 + Math.random() * 150,
                    width: 60 + Math.random() * 40,
                    speed: 0.2 + Math.random() * 0.3
                });
            }
        }
        
        // Particle system
        function createParticles(x, y, color, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color: color
                });
            }
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3; // gravity
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        
        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x - cameraX, p.y, 4, 4);
                ctx.globalAlpha = 1;
            });
        }
        
        // Physics
        function updateMario() {
            // Horizontal movement
            if (keys['ArrowLeft'] || keys['KeyA']) {
                mario.vx = -mario.speed;
                mario.facing = -1;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                mario.vx = mario.speed;
                mario.facing = 1;
            } else {
                mario.vx *= 0.8;
            }
            
            // Jump
            if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && mario.grounded) {
                mario.vy = mario.jumpPower;
                mario.grounded = false;
                createParticles(mario.x + mario.width/2, mario.y + mario.height, '#8B4513', 3);
            }
            
            // Apply gravity
            mario.vy += 0.6;
            
            // Update position
            mario.x += mario.vx;
            mario.y += mario.vy;
            
            // Platform collisions
            mario.grounded = false;
            platforms.forEach(plat => {
                if (mario.x < plat.x + plat.width &&
                    mario.x + mario.width > plat.x &&
                    mario.y < plat.y + plat.height &&
                    mario.y + mario.height > plat.y) {
                    
                    // Landing on top
                    if (mario.vy > 0 && mario.y < plat.y) {
                        mario.y = plat.y - mario.height;
                        mario.vy = 0;
                        mario.grounded = true;
                        
                        // Hit question block from below
                        if (plat.type === 'question' && !plat.hit) {
                            plat.hit = true;
                            score += 200;
                            createParticles(plat.x + 16, plat.y, '#FFD700', 8);
                            // Spawn coin above
                            coins.push({ x: plat.x + 8, y: plat.y - 40, width: 16, height: 16, collected: false, pop: true });
                        }
                    }
                    // Hitting from below
                    else if (mario.vy < 0 && mario.y > plat.y) {
                        mario.y = plat.y + plat.height;
                        mario.vy = 0;
                    }
                    // Side collision
                    else if (mario.vx > 0) {
                        mario.x = plat.x - mario.width;
                        mario.vx = 0;
                    } else if (mario.vx < 0) {
                        mario.x = plat.x + plat.width;
                        mario.vx = 0;
                    }
                }
            });
            
            // Pipe collisions
            pipes.forEach(pipe => {
                if (mario.x < pipe.x + pipe.width &&
                    mario.x + mario.width > pipe.x &&
                    mario.y < pipe.y + pipe.height &&
                    mario.y + mario.height > pipe.y) {
                    if (mario.vx > 0) {
                        mario.x = pipe.x - mario.width;
                        mario.vx = 0;
                    } else if (mario.vx < 0) {
                        mario.x = pipe.x + pipe.width;
                        mario.vx = 0;
                    }
                }
            });
            
            // Fall off world
            if (mario.y > 500) {
                loseLife();
            }
            
            // Camera follow
            cameraX = mario.x - 200;
            if (cameraX < 0) cameraX = 0;
        }
        
        function updateEnemies() {
            enemies.forEach(enemy => {
                if (enemy.dead) return;
                
                enemy.x += enemy.vx;
                
                // Turn around at edges
                let onPlatform = false;
                platforms.forEach(plat => {
                    if (plat.type === 'ground' &&
                        enemy.x + enemy.width/2 > plat.x &&
                        enemy.x + enemy.width/2 < plat.x + plat.width &&
                        enemy.y + enemy.height >= plat.y &&
                        enemy.y + enemy.height <= plat.y + 10) {
                        onPlatform = true;
                    }
                });
                
                if (!onPlatform) enemy.vx *= -1;
                
                // Collision with Mario
                if (mario.x < enemy.x + enemy.width &&
                    mario.x + mario.width > enemy.x &&
                    mario.y < enemy.y + enemy.height &&
                    mario.y + mario.height > enemy.y) {
                    
                    // Jump on enemy
                    if (mario.vy > 0 && mario.y < enemy.y) {
                        enemy.dead = true;
                        mario.vy = -8;
                        score += 100;
                        createParticles(enemy.x + 16, enemy.y + 16, '#8B4513', 10);
                    } else {
                        loseLife();
                    }
                }
            });
        }
        
        function updateCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;
                
                // Pop animation for question block coins
                if (coin.pop) {
                    coin.y -= 2;
                    if (coin.y < coin.y - 60) coin.collected = true;
                }
                
                // Collision with Mario
                if (mario.x < coin.x + coin.width &&
                    mario.x + mario.width > coin.x &&
                    mario.y < coin.y + coin.height &&
                    mario.y + mario.height > coin.y) {
                    coin.collected = true;
                    score += 100;
                    createParticles(coin.x + 8, coin.y + 8, '#FFD700', 5);
                }
            });
        }
        
        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < cameraX - 100) {
                    cloud.x = cameraX + 900 + Math.random() * 200;
                }
            });
        }
        
        function loseLife() {
            lives--;
            createParticles(mario.x + 16, mario.y + 16, '#ff0000', 15);
            if (lives <= 0) {
                gameOver();
            } else {
                mario.x = 100;
                mario.y = 300;
                mario.vx = 0;
                mario.vy = 0;
                cameraX = 0;
            }
        }
        
        function gameOver() {
            gameRunning = false;
            clearInterval(timeInterval);
            document.getElementById('finalScore').textContent = score.toString().padStart(6, '0');
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // Drawing functions
        function drawMario() {
            const x = mario.x - cameraX;
            const y = mario.y;
            
            // Simple pixel art Mario
            ctx.fillStyle = '#ff0000'; // Red hat/shirt
            ctx.fillRect(x + 8, y, 16, 8);
            ctx.fillRect(x + 4, y + 16, 24, 8);
            
            ctx.fillStyle = '#0000ff'; // Blue overalls
            ctx.fillRect(x + 4, y + 24, 24, 8);
            
            ctx.fillStyle = '#ffcc99'; // Face
            ctx.fillRect(x + 8, y + 8, 16, 8);
            
            ctx.fillStyle = '#654321'; // Shoes
            ctx.fillRect(x + 4, y + 28, 8, 4);
            ctx.fillRect(x + 20, y + 28, 8, 4);
            
            // Eyes
            ctx.fillStyle = '#000000';
            if (mario.facing > 0) {
                ctx.fillRect(x + 18, y + 10, 4, 4);
            } else {
                ctx.fillRect(x + 10, y + 10, 4, 4);
            }
        }
        
        function drawPlatforms() {
            platforms.forEach(plat => {
                const x = plat.x - cameraX;
                if (x < -50 || x > 850) return;
                
                if (plat.type === 'ground') {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(x, plat.y, plat.width, plat.height);
                    ctx.fillStyle = '#228B22';
                    ctx.fillRect(x, plat.y, plat.width, 4);
                } else if (plat.type === 'brick') {
                    ctx.fillStyle = '#D2691E';
                    ctx.fillRect(x, plat.y, plat.width, plat.height);
                    ctx.fillStyle = '#8B4513';
                    ctx.strokeRect(x, plat.y, plat.width, plat.height);
                    // Brick pattern
                    ctx.beginPath();
                    ctx.moveTo(x, plat.y + 16);
                    ctx.lineTo(x + plat.width, plat.y + 16);
                    ctx.moveTo(x + 16, plat.y);
                    ctx.lineTo(x + 16, plat.y + 16);
                    ctx.stroke();
                } else if (plat.type === 'question') {
                    if (plat.hit) {
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(x, plat.y, plat.width, plat.height);
                    } else {
                        ctx.fillStyle = '#FFD700';
                        ctx.fillRect(x, plat.y, plat.width, plat.height);
                        ctx.fillStyle = '#000000';
                        ctx.font = 'bold 20px monospace';
                        ctx.textAlign = 'center';
                        ctx.fillText('?', x + 16, plat.y + 24);
                    }
                }
            });
        }
        
        function drawPipes() {
            pipes.forEach(pipe => {
                const x = pipe.x - cameraX;
                if (x < -100 || x > 900) return;
                
                // Pipe body
                ctx.fillStyle = '#00aa00';
                ctx.fillRect(x, pipe.y, pipe.width, pipe.height);
                
                // Pipe highlight
                ctx.fillStyle = '#00cc00';
                ctx.fillRect(x + 4, pipe.y, 8, pipe.height);
                
                // Pipe rim
                ctx.fillStyle = '#00aa00';
                ctx.fillRect(x - 4, pipe.y, pipe.width + 8, 20);
                ctx.fillStyle = '#00cc00';
                ctx.fillRect(x, pipe.y + 4, 8, 12);
            });
        }
        
        function drawEnemies() {
            enemies.forEach(enemy => {
                if (enemy.dead) return;
                const x = enemy.x - cameraX;
                if (x < -50 || x > 850) return;
                
                // Goomba (brown mushroom enemy)
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(x + 4, enemy.y + 8, 24, 20);
                
                // Feet
                ctx.fillStyle = '#000000';
                ctx.fillRect(x + 4, enemy.y + 26, 8, 6);
                ctx.fillRect(x + 20, enemy.y + 26, 8, 6);
                
                // Eyebrows (angry look)
                ctx.fillStyle = '#000000';
                ctx.fillRect(x + 6, enemy.y + 10, 8, 3);
                ctx.fillRect(x + 18, enemy.y + 10, 8, 3);
            });
        }
        
        function drawCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;
                const x = coin.x - cameraX;
                if (x < -50 || x > 850) return;
                
                // Animated coin
                const bounce = Math.sin(Date.now() / 100) * 3;
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(x + 8, coin.y + 8 + bounce, 6, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.ellipse(x + 8, coin.y + 8 + bounce, 4, 6, 0, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawClouds() {
            clouds.forEach(cloud => {
                const x = cloud.x - cameraX;
                if (x < -200 || x > 1000) return;
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(x, cloud.y, 20, 0, Math.PI * 2);
                ctx.arc(x + 25, cloud.y - 10, 25, 0, Math.PI * 2);
                ctx.arc(x + 50, cloud.y, 20, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 480);
            gradient.addColorStop(0, '#5c94fc');
            gradient.addColorStop(1, '#4a7de0');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 480);
            
            // Distant hills
            ctx.fillStyle = '#228B22';
            ctx.beginPath();
            ctx.moveTo(0, 480);
            for (let i = 0; i <= 800; i += 100) {
                ctx.lineTo(i, 400 - Math.sin(i * 0.01) * 50);
            }
            ctx.lineTo(800, 480);
            ctx.fill();
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score.toString().padStart(6, '0');
            document.getElementById('lives').textContent = lives;
            document.getElementById('time').textContent = time;
        }
        
        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear and draw background
            drawBackground();
            
            // Update game objects
            updateMario();
            updateEnemies();
            updateCoins();
            updateClouds();
            updateParticles();
            
            // Draw everything
            drawClouds();
            drawPipes();
            drawPlatforms();
            drawCoins();
            drawEnemies();
            drawMario();
            drawParticles();
            
            // Update UI
            updateUI();
            
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            lives = 3;
            time = 400;
            mario.x = 100;
            mario.y = 300;
            mario.vx = 0;
            mario.vy = 0;
            cameraX = 0;
            initLevel();
            
            timeInterval = setInterval(() => {
                if (gameRunning && time > 0) {
                    time--;
                    if (time <= 0) loseLife();
                }
            }, 1000);
            
            gameLoop();
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            gameRunning = true;
            score = 0;
            lives = 3;
            time = 400;
            mario.x = 100;
            mario.y = 300;
            mario.vx = 0;
            mario.vy = 0;
            cameraX = 0;
            initLevel();
            
            timeInterval = setInterval(() => {
                if (gameRunning && time > 0) {
                    time--;
                    if (time <= 0) loseLife();
                }
            }, 1000);
            
            gameLoop();
        }
        
        // Initial draw
        drawBackground();
        drawClouds();
    </script>
</body>
</html>
